services:
  rag-api:
    image: ${RAG_API_IMAGE:-python:3.12-slim}
    container_name: ${RAG_DOCKER_NAME:-mlx-isolated-rag}
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -lc '
        if [ ! -x /venv/bin/python ]; then echo "Creating RAG API venv"; python -m venv /venv; fi &&
        if ! /venv/bin/python -c "import fastapi, uvicorn, requests, qdrant_client" > /dev/null 2>&1; then
          echo "Installing RAG API Python dependencies into /venv";
          /venv/bin/pip install --upgrade pip wheel > /dev/null &&
          /venv/bin/pip install --upgrade fastapi uvicorn pydantic requests qdrant-client > /dev/null;
        fi &&
        echo "Starting RAG API";
        exec /venv/bin/python /app/scripts/rag-container-api.py serve
      '
    ports:
      - "${RAG_BIND_HOST:-127.0.0.1}:${RAG_PORT:-8765}:${RAG_PORT:-8765}"
    environment:
      RAG_ENABLED: "1"
      RAG_SOURCE_PATH: /source
      RAG_HOST: 127.0.0.1
      RAG_BIND_HOST: 0.0.0.0
      RAG_PORT: ${RAG_PORT:-8765}
      RAG_TEXT_EXTENSIONS: ${RAG_TEXT_EXTENSIONS:-.md,.txt,.rst,.csv,.tsv,.json,.yaml,.yml,.toml,.xml,.html,.xlsx,.xlsm,.xls,.xlsb,.ods,.pdf,.png,.jpg,.jpeg,.tif,.tiff,.doc,.docx,.ppt,.pptx}
      RAG_EXCLUDE_GLOBS: ${RAG_EXCLUDE_GLOBS:-.git/**,.obsidian/**,node_modules/**,.trash/**,*.env,*.key,*.pem}
      RAG_MAX_FILE_MB: ${RAG_MAX_FILE_MB:-10}
      RAG_DOCUMENT_MAX_FILE_MB: ${RAG_DOCUMENT_MAX_FILE_MB:-50}
      RAG_CHUNK_TOKENS: ${RAG_CHUNK_TOKENS:-400}
      RAG_CHUNK_OVERLAP_TOKENS: ${RAG_CHUNK_OVERLAP_TOKENS:-50}
      RAG_TOP_K: ${RAG_TOP_K:-8}
      RAG_PDF_ENABLED: ${RAG_PDF_ENABLED:-1}
      RAG_IMAGES_ENABLED: ${RAG_IMAGES_ENABLED:-1}
      RAG_OCR_ENABLED: ${RAG_OCR_ENABLED:-1}
      RAG_OCR_MODE: ${RAG_OCR_MODE:-needed}
      RAG_OCR_LANGUAGES: ${RAG_OCR_LANGUAGES:-rus+eng+deu}
      RAG_OCR_MIN_TEXT_CHARS: ${RAG_OCR_MIN_TEXT_CHARS:-200}
      RAG_OCR_MAX_PAGES: ${RAG_OCR_MAX_PAGES:-25}
      RAG_AUTO_INDEX: ${RAG_AUTO_INDEX:-1}
      RAG_AUTO_INDEX_ON_START: ${RAG_AUTO_INDEX_ON_START:-1}
      RAG_WATCH_INTERVAL_SECONDS: ${RAG_WATCH_INTERVAL_SECONDS:-20}
      RAG_WATCH_DEBOUNCE_SECONDS: ${RAG_WATCH_DEBOUNCE_SECONDS:-3}
      RAG_DOCKER_EMBEDDING_BACKEND: ${RAG_DOCKER_EMBEDDING_BACKEND:-tei}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-intfloat/multilingual-e5-small}
      RAG_HASH_EMBEDDING_DIM: ${RAG_HASH_EMBEDDING_DIM:-384}
      RAG_QDRANT_URL: http://qdrant:6333
      RAG_QDRANT_COLLECTION: ${RAG_QDRANT_COLLECTION:-rag_chunks}
      RAG_TEI_URL: http://tei:80
      RAG_TIKA_URL: http://tika:9998
      RAG_DOCLING_URL: http://docling:5001
    volumes:
      # Documents source — read-only. Set RAG_SOURCE_MOUNT in .env (host path to your RAG documents folder).
      - ${RAG_SOURCE_MOUNT:?Set RAG_SOURCE_MOUNT in .env (host path to your RAG documents directory)}:/source:ro
      - ./scripts:/app/scripts:ro
      # venv and cache use Docker volumes so pip installs survive restarts.
      - rag-api-venv:/venv
      - rag-cache:/cache
    depends_on:
      - qdrant
      - tika
      - docling

  qdrant:
    image: ${RAG_QDRANT_IMAGE:-qdrant/qdrant:latest}
    container_name: ${RAG_QDRANT_NAME:-mlx-isolated-rag-qdrant}
    restart: unless-stopped
    volumes:
      # Vector index lives in a Docker volume — persists across restarts,
      # survives make rag-down / rag-up without losing the index.
      - rag-qdrant:/qdrant/storage

  tei:
    image: ${RAG_TEI_IMAGE:-ghcr.io/huggingface/text-embeddings-inference:cpu-arm64-latest}
    container_name: ${RAG_TEI_NAME:-mlx-isolated-rag-tei}
    profiles: ["tei"]
    restart: unless-stopped
    command: ["--model-id", "${RAG_EMBEDDING_MODEL:-intfloat/multilingual-e5-small}", "--port", "80"]
    environment:
      HF_HOME: /data
    volumes:
      - rag-cache:/data
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 3G

  tika:
    image: ${RAG_TIKA_IMAGE:-apache/tika:latest-full}
    container_name: ${RAG_TIKA_NAME:-mlx-isolated-rag-tika}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1500M

  docling:
    image: ${RAG_DOCLING_IMAGE:-quay.io/docling-project/docling-serve:latest}
    container_name: ${RAG_DOCLING_NAME:-mlx-isolated-rag-docling}
    restart: unless-stopped
    environment:
      DOCLING_SERVE_MAX_SYNC_WAIT: 300
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G

  playwright-service:
    image: ghcr.io/firecrawl/playwright-service:latest
    container_name: mlx-firecrawl-playwright
    restart: unless-stopped
    environment:
      PORT: 3000
      PROXY_SERVER: ${FIRECRAWL_PROXY_SERVER:-}
      PROXY_USERNAME: ${FIRECRAWL_PROXY_USERNAME:-}
      PROXY_PASSWORD: ${FIRECRAWL_PROXY_PASSWORD:-}
      ALLOW_LOCAL_WEBHOOKS: ${FIRECRAWL_ALLOW_LOCAL_WEBHOOKS:-true}
      BLOCK_MEDIA: ${FIRECRAWL_BLOCK_MEDIA:-true}
      MAX_CONCURRENT_PAGES: ${FIRECRAWL_CRAWL_CONCURRENT_REQUESTS:-10}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    tmpfs:
      - /tmp/.cache:noexec,nosuid,size=512m

  firecrawl-api:
    image: ghcr.io/firecrawl/firecrawl:latest
    container_name: mlx-firecrawl-api
    restart: unless-stopped
    command: node dist/src/harness.js --start-docker
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_RATE_LIMIT_URL: redis://redis:6379
      PLAYWRIGHT_MICROSERVICE_URL: http://playwright-service:3000/scrape
      POSTGRES_USER: ${FIRECRAWL_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${FIRECRAWL_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${FIRECRAWL_POSTGRES_DB:-postgres}
      POSTGRES_HOST: nuq-postgres
      POSTGRES_PORT: 5432
      USE_DB_AUTHENTICATION: "false"
      NUM_WORKERS_PER_QUEUE: ${FIRECRAWL_NUM_WORKERS_PER_QUEUE:-8}
      CRAWL_CONCURRENT_REQUESTS: ${FIRECRAWL_CRAWL_CONCURRENT_REQUESTS:-10}
      MAX_CONCURRENT_JOBS: ${FIRECRAWL_MAX_CONCURRENT_JOBS:-5}
      BROWSER_POOL_SIZE: ${FIRECRAWL_BROWSER_POOL_SIZE:-5}
      BULL_AUTH_KEY: ${FIRECRAWL_BULL_AUTH_KEY:-omlx_firecrawl_secret_auth_key}
      HOST: 0.0.0.0
      PORT: 3002
      INTERNAL_PORT: 3002
      EXTRACT_WORKER_PORT: 3004
      WORKER_PORT: 3005
      NUQ_RABBITMQ_URL: amqp://rabbitmq:5672
      HARNESS_STARTUP_TIMEOUT_MS: 60000
      ENV: local
    depends_on:
      redis:
        condition: service_started
      playwright-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    ports:
      - "${FIRECRAWL_BIND_HOST:-127.0.0.1}:${FIRECRAWL_PORT:-3002}:3002"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  redis:
    image: redis:alpine
    container_name: mlx-firecrawl-redis
    restart: unless-stopped
    command: redis-server --bind 0.0.0.0

  rabbitmq:
    image: rabbitmq:3-management
    container_name: mlx-firecrawl-rabbitmq
    restart: unless-stopped
    command: rabbitmq-server
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s

  nuq-postgres:
    image: ghcr.io/firecrawl/nuq-postgres:latest
    container_name: mlx-firecrawl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${FIRECRAWL_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${FIRECRAWL_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${FIRECRAWL_POSTGRES_DB:-postgres}

  syncthing:
    image: syncthing/syncthing:latest
    container_name: mlx-syncthing
    restart: unless-stopped
    user: "0:0"
    environment:
      - PUID=0
      - PGID=0
    volumes:
      - rag-syncthing-config:/var/syncthing/config
      - ${SYNCTHING_SYNC_MOUNT:?Set SYNCTHING_SYNC_PATH in .env}:/var/syncthing/Sync
    ports:
      - "${SYNCTHING_BIND_HOST:-127.0.0.1}:${SYNCTHING_PORT:-8384}:8384"
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
    profiles: ["syncthing"]

  n8n:
    image: n8nio/n8n:latest
    container_name: mlx-n8n
    restart: unless-stopped
    ports:
      - "${N8N_BIND_HOST:-127.0.0.1}:${N8N_PORT:-5678}:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://${N8N_HOST:-localhost}:${N8N_PORT:-5678}/
      - GENERIC_TIMEZONE=${N8N_TIMEZONE:-Europe/Berlin}
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_INSTANCE_OWNER_MANAGED_BY_ENV=${N8N_INSTANCE_OWNER_MANAGED_BY_ENV:-true}
      - N8N_INSTANCE_OWNER_EMAIL=${N8N_INSTANCE_OWNER_EMAIL:-admin@local.agent}
      - N8N_INSTANCE_OWNER_PASSWORD_HASH=${N8N_INSTANCE_OWNER_PASSWORD_HASH:-$$2b$$10$$Dhm1nxywuRqjTkN6ZW8rKO8GsaIgxpfKy6xYakYv9lPHiwvusu7Rm}
    volumes:
      - rag-n8n-data:/home/node/.n8n
    profiles: ["n8n"]

# Named Docker volumes — managed by Docker, survive make rag-down / rag-up.
# To wipe and reindex from scratch: docker volume rm mlx-isolated-rag_rag-qdrant
volumes:
  rag-qdrant:
  rag-api-venv:
  rag-cache:
  rag-syncthing-config:
  rag-n8n-data:

