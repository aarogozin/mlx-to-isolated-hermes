name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Verify Tag Matches VERSION File
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="${{ steps.version.outputs.value }}"
          if [[ "${TAG_VERSION}" != "${FILE_VERSION}" ]]; then
            echo "ERROR: Pushed tag 'v${TAG_VERSION}' does not match version in VERSION file ('${FILE_VERSION}')." >&2
            echo "Please update the VERSION file and commit it before pushing the tag." >&2
            exit 1
          fi

      - name: Extract changelog section
        id: changelog
        run: |
          # Extract the section for the current version from CHANGELOG.md
          VERSION="${{ steps.version.outputs.value }}"
          body="$(awk "/^## ${VERSION}/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md | sed '/^[[:space:]]*$/d')"
          if [[ -z "${body}" ]]; then
            body="Release ${VERSION}"
          fi
          # Write to a file to avoid shell quoting issues
          printf '%s\n' "${body}" > /tmp/release_notes.md
          echo "body_path=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Go binary (darwin/arm64 only)
        run: |
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o omlx-agent .
          tar -czf omlx-agent-v${{ steps.version.outputs.value }}-darwin-arm64.tar.gz omlx-agent

      - name: Calculate SHA256
        id: sha256
        run: |
          SHA="$(shasum -a 256 omlx-agent-v${{ steps.version.outputs.value }}-darwin-arm64.tar.gz | awk '{print $1}')"
          echo "value=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.value }}"
          body_path: ${{ steps.changelog.outputs.body_path }}
          files: omlx-agent-v${{ steps.version.outputs.value }}-darwin-arm64.tar.gz
          draft: false
          prerelease: ${{ contains(steps.version.outputs.value, '-') }}

      - name: Update Homebrew Tap
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          if [[ -z "${TAP_DEPLOY_KEY}" ]]; then
            echo "TAP_DEPLOY_KEY secret is not set. Skipping Homebrew tap update."
            exit 0
          fi

          VERSION="${{ steps.version.outputs.value }}"
          SHA256="${{ steps.sha256.outputs.value }}"

          # Set up SSH key for push
          mkdir -p ~/.ssh
          echo "${TAP_DEPLOY_KEY}" > ~/.ssh/tap_deploy_key
          chmod 600 ~/.ssh/tap_deploy_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_deploy_key -o StrictHostKeyChecking=no"

          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Clone the tap repository using SSH
          git clone git@github.com:aarogozin/homebrew-tap.git homebrew-tap
          cd homebrew-tap

          # Create Formula directory if it doesn't exist
          mkdir -p Formula

          # Write the new Formula content
          cat <<EOF > Formula/omlx-agent.rb
class OmlxAgent < Formula
  desc "MLX Isolated Agent Stack CLI"
  homepage "https://github.com/aarogozin/mlx-to-isolated-hermes"
  version "${VERSION}"
  url "https://github.com/aarogozin/mlx-to-isolated-hermes/releases/download/v${VERSION}/omlx-agent-v${VERSION}-darwin-arm64.tar.gz"
  sha256 "${SHA256}"
  license "MIT"

  def install
    bin.install "omlx-agent"
  end

  test do
    assert_match "MLX Isolated Agent Stack", shell_output("#{bin}/omlx-agent")
  end
end
EOF

          # Commit and push
          git add Formula/omlx-agent.rb
          git commit -m "Update omlx-agent to v${VERSION}"
          git push origin
