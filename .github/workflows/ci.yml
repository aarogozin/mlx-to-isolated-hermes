name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell:
    name: Shell checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell syntax
        run: |
          find scripts -name '*.sh' -print0 \
            | xargs -0 -I{} bash -n {}

      - name: Shared folder mock tests
        run: scripts/test-shared-mounts-mock.sh
