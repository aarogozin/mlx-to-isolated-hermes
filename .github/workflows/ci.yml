name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell:
    name: Static and mock checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell syntax
        run: |
          find scripts -name '*.sh' -print0 \
            | xargs -0 -I{} bash -n {}

      - name: Check tracked text is English-only
        run: scripts/check-english-text.py


      - name: Python syntax and RAG unit tests
        run: |
          python3 -m py_compile scripts/models-doctor.py scripts/rag.py scripts/rag-container-api.py scripts/check-english-text.py
          RAG_EMBEDDING_BACKEND=hash scripts/test-rag-unit.sh
          RAG_EMBEDDING_BACKEND=hash scripts/test-rag-ocr-smoke.sh

      - name: Release check without host-only e2e
        run: |
          SKIP_HOST_DOCTOR=1 \
          SKIP_RAG_E2E=1 \
          SKIP_VM_E2E=1 \
          SKIP_DOCKER_E2E=1 \
          RAG_EMBEDDING_BACKEND=hash \
            scripts/release-check.sh

      - name: Synthetic RAG matrix dry-run
        run: |
          RAG_EMBEDDING_BACKEND=hash \
          MATRIX_MODES=" " \
          MATRIX_CLEAN_MODE=none \
          MATRIX_REPORT_DIR=.runtime/matrix-e2e/ci-synthetic \
            scripts/matrix-e2e.sh

      - name: OpenClaw Docker command mock
        run: scripts/test-openclaw-docker-command-mock.sh

      - name: Setup Wizard dry-run tests
        run: scripts/test-wizard.sh


  docker:
    name: Docker checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker daemon
        run: docker version

      - name: Validate Docker Compose files
        run: |
          RAG_SOURCE_MOUNT=/tmp docker compose -f docker-compose.rag.yml config >/dev/null
          CLOUDFLARE_TUNNEL_TOKEN=dummy-token docker compose -f docker-compose.cloudflared.yml config >/dev/null

      - name: Docker shared folder smoke
        run: scripts/test-docker-shared-mount.sh
